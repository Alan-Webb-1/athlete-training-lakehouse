version: 2

models:
  - name: mart_athlete_training_summary
    description: Dashboard-ready athlete training summary mart built from weekly training metrics.
    columns:
      - name: athlete_id
        tests:
          - not_null
          - unique

      - name: athlete_name
        tests:
          - not_null

      - name: total_activities
        tests:
          - not_null

      - name: total_miles
        tests:
          - not_null

      - name: active_training_weeks
        tests:
          - not_null
version: 2

models:
  - name: stg_activities
    description: Clean staging model for one row per athlete activity from the Silver layer.
    columns:
      - name: activity_id
        tests:
          - not_null
          - unique

      - name: athlete_id
        tests:
          - not_null

      - name: athlete_name
        tests:
          - not_null

      - name: activity_date
        tests:
          - not_null

      - name: distance_miles
        tests:
          - not_null

      - name: duration_minutes
        tests:
          - not_null